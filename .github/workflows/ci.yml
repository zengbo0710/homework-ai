name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Typecheck api
        run: npm run typecheck --workspace=packages/api

      - name: Typecheck web
        run: npm run typecheck --workspace=packages/web

      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homework_ai
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u app -papp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run Prisma migration
        working-directory: packages/api
        env:
          DATABASE_URL: mysql://app:app@localhost:3306/homework_ai
        run: npx prisma migrate deploy

      - name: Test api
        working-directory: packages/api
        env:
          DATABASE_URL: mysql://app:app@localhost:3306/homework_ai
        run: npm test

      - name: Test web
        run: npm test --workspace=packages/web
