services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: homework_ai
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/api/uploads:/app/packages/api/uploads
    env_file: .env.local
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web/src:/app/packages/web/src
    depends_on:
      - api

volumes:
  mysql_dev_data:
